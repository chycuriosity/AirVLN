# 云端大模型评测默认配置。
# 这个文件会被 git 跟踪，请不要在这里提交真实 API key。
# 如果需要把 key 写进文件，请复制为 configs/cloud_eval.local.yaml 后填写；
# cloud_eval.sh 会优先读取 local 配置，且该文件已被 .gitignore 忽略。

# 固定为 eval；云端评测只做测试，不训练本地模型。
run_type: eval

# 保持原项目的 TF 数据/评测流程。
collect_type: TF

# 本次实验名称；输出会写到 ../DATA/output/{name}/eval/。
name: Cloud-Qwen35-Plus

# 云端请求建议先用 1，稳定后再考虑并发。
batchSize: 1

# 评测数据集，可选 train、val_seen、val_unseen、test。
EVAL_DATASET: val_unseen

# 评测 episode 数量；-1 表示全量。
EVAL_NUM: 10

# 单个 episode 最多执行多少步；全量正式评测通常可设为 500。
maxAction: 100

# 是否生成视频；开启后会额外写视频文件，速度更慢。
EVAL_GENERATE_VIDEO: True

# 云端模型名称。
cloud_model: Ali-dashscope/Qwen3.5-Plus

# OpenAI compatible API 地址。
cloud_base_url: https://xplt.sdu.edu.cn:4000

# API key。请不要在这个被 git 跟踪的文件里填写真实 key。
# 推荐在 configs/cloud_eval.local.yaml 中填写，或使用下面的环境变量。
cloud_api_key: "sk-ZIWFsXOeqJirs1KclTa0rg"

# 当 cloud_api_key 为空时，从这个环境变量读取 API key。
cloud_api_key_env: DASHSCOPE_API_KEY

# 是否禁用系统代理。xplt.sdu.edu.cn 当前需要直连，建议保持 true。
cloud_disable_proxy: true

# 是否校验 HTTPS 证书。xplt.sdu.edu.cn 当前直连测试需要关闭校验，建议保持 false。
cloud_verify_ssl: false

# 采样温度；评测建议保持 0，减少随机性。
cloud_temperature: 0.0

# 单次动作回复的最大 token 数；启用 memory 后需要略大一些。
cloud_max_tokens: 128

# 单次云端 API 请求超时时间，单位秒。
cloud_timeout: 60.0

# 单步动作请求失败或返回非法动作时的最大重试次数。
cloud_max_retries: 3

# 单次评测最多允许多少个云端动作请求；-1 表示不限制。
cloud_max_api_calls: -1

# 重试后仍失败时执行的兜底动作，可用 STOP、MOVE_FORWARD 等动作名。
cloud_fallback_action: STOP

# system prompt 模板路径；为空时使用代码内置模板。推荐使用仓库内模板，便于复现实验。
cloud_prompt_system_path: configs/prompts/cloud_vln_depth_v2_system.txt

# user prompt 模板路径；为空时使用代码内置模板。模板里会填充指令、历史、pose、深度摘要等字段。
cloud_prompt_user_path: configs/prompts/cloud_vln_depth_v2_user.txt

# 是否启用语义记忆。开启后模型每步需要返回 memory，下一步会带回 prompt。
cloud_use_memory: true

# 是否不发送 RGB 图像；false 表示发送 RGB，正式 VLN 评测建议保持 false。
cloud_no_rgb: false

# 是否把当前 pose 作为文本发给模型；开启后模型会看到 [x,y,z,qw,qx,qy,qz]。
cloud_use_pose: true

# 深度图发送模式：
# none    不发送深度信息
# summary 只发送深度文本摘要
# image   只发送伪彩色深度图
# both    同时发送伪彩色深度图和文本摘要，推荐用于正式云端评测
cloud_depth_mode: both

# 深度图伪彩色渲染的近/远百分位裁剪，避免极端值破坏对比度。
cloud_depth_near_percentile: 2.0
cloud_depth_far_percentile: 98.0

# 深度摘要网格大小。3 表示输出 3x3 的 depth 均值和最小值网格。
cloud_depth_grid_size: 3

# 判定近处障碍的深度阈值，用于 near_obstacle_ratio 等摘要字段。
cloud_depth_near_threshold: 0.05

# 是否把深度图压缩成文本摘要发送给模型；cloud_depth_mode 为 both/summary 时也会发送。
cloud_use_depth_summary: true

# 是否额外保存 prompt 调试信息；默认关闭以减少日志体积。
cloud_save_prompts: false

# 是否保存每一步实际发给云模型的 RGB、深度图和 prompt，便于复盘；会增加磁盘占用。
cloud_save_input_images: false

# 是否在保存输入时额外保存去除 base64 的请求 JSON 快照。
cloud_save_request_json: false

# 是否跳过同一 name/model 下已经有单 episode 结果的样本，用于中断后续跑。
cloud_resume: true

# 仿真服务端口；需要和 AirVLNSimulatorServerTool.py 的端口一致。
simulator_tool_port: 30000
